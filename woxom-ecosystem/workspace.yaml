workspace:
  name: woxom-ecosystem
  repos_dir: "."

repos:
  - name: woxom-infra
    path: ./woxom-infra
    url: https://github.com/Augmenting-Integrations/woxom-infra.git
    repo_type: service
    base_branch: dev
    pr_target_branch: dev
    install: uv sync --all-extras
    test: uv run pytest
    lint: uv run pre-commit run --all-files

  - name: woxom-common
    path: ./woxom-common
    url: https://github.com/Augmenting-Integrations/woxom-common.git
    repo_type: library
    base_branch: main
    pr_target_branch: main
    install: uv sync --all-extras
    test: uv run pytest
    lint: uv run pre-commit run --all-files
    depends_on: [woxom-infra]

  - name: woxom-crm
    path: ./woxom-crm
    url: https://github.com/Augmenting-Integrations/woxom-crm.git
    repo_type: service
    base_branch: dev
    pr_target_branch: dev
    install: npm install
    test: npm test
    lint: npm run lint
    depends_on: [woxom-infra, woxom-common]

  - name: woxom-data-parser
    path: ./woxom-data-parser
    url: https://github.com/Augmenting-Integrations/woxom-data-parser.git
    repo_type: service
    base_branch: dev
    pr_target_branch: dev
    install: uv sync --all-extras
    test: uv run pytest
    lint: uv run pre-commit run --all-files
    depends_on: [woxom-infra, woxom-common]

  - name: woxom-health-web
    path: ./woxom-health-web
    url: https://github.com/Augmenting-Integrations/woxom-health-web.git
    repo_type: service
    base_branch: dev
    pr_target_branch: dev
    install: npm install
    test: npm test
    lint: npm run lint
    depends_on: [woxom-infra, woxom-common]

  - name: woxom-quoting-tool
    path: ./woxom-quoting-tool
    url: https://github.com/Augmenting-Integrations/woxom-quoting-tool.git
    repo_type: service
    base_branch: dev
    pr_target_branch: dev
    install: npm install
    test: npm test
    lint: npm run lint
    depends_on: [woxom-infra, woxom-common]

  - name: woxom-sales-dashboard
    path: ./woxom-sales-dashboard
    url: https://github.com/Augmenting-Integrations/woxom-sales-dashboard.git
    repo_type: service
    base_branch: dev
    pr_target_branch: dev
    install: uv sync --all-extras
    test: uv run pytest
    lint: uv run pre-commit run --all-files
    depends_on: [woxom-infra, woxom-common]

  - name: woxom-visualization
    path: ./woxom-visualization
    url: https://github.com/Augmenting-Integrations/woxom-visualization.git
    repo_type: library
    base_branch: main
    pr_target_branch: main
    install: npm install
    test: npm test
    lint: npm run lint
