gate: Unit tests
language: python
repo_type: iac
required_steps:
  - kind: action
    matches: actions/checkout
  - kind: action
    matches: actions/setup-python
  - kind: action
    matches: astral-sh/setup-uv
  - kind: run
    matches_regex: '^uv sync\b'
  - kind: run
    matches_regex: 'uv run pytest .*--cov-fail-under=80'
  - kind: action
    matches: actions/upload-artifact
