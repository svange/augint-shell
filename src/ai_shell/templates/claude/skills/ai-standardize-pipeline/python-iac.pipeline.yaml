name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - dev
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - dev
      - main

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.12' }}

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: [code-quality]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Bandit
        run: |
          uv run bandit -r src/ -f json -o bandit-report.json || true
          uv run bandit -r src/ -ll
      - name: pip-audit
        run: |
          uv export --no-dev --no-hashes -o prod-requirements.txt
          uv run pip-audit --desc --format json --output pip-audit-report.json -r prod-requirements.txt --no-deps
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/security-audit
            p/secrets
            p/owasp-top-ten
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: pytest
        run: |
          uv run pytest \
            --cov=src --cov-report=html --cov-report=xml --cov-fail-under=80 \
            --html=test-report.html --self-contained-html \
            -v
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.xml

  compliance:
    name: Compliance
    runs-on: ubuntu-latest
    needs: [code-quality]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Generate license reports
        run: |
          uv run pip-licenses --from=mixed --format=json --output-file=license-report.json
          uv run pip-licenses --from=mixed --fail-on 'GPL;AGPL;LGPL' --summary
      - name: Upload license reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: license-reports
          path: license-report.json

  build-validation:
    name: Build validation
    runs-on: ubuntu-latest
    needs: [code-quality]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Detect IaC toolchain
        id: detect
        run: |
          if [ -f samconfig.toml ] || [ -f template.yaml ]; then
            echo "tool=sam" >> $GITHUB_OUTPUT
          elif [ -f cdk.json ]; then
            echo "tool=cdk" >> $GITHUB_OUTPUT
          elif ls *.tf >/dev/null 2>&1; then
            echo "tool=terraform" >> $GITHUB_OUTPUT
          else
            echo "tool=none" >> $GITHUB_OUTPUT
          fi
      - name: SAM validate and build
        if: steps.detect.outputs.tool == 'sam'
        uses: aws-actions/setup-sam@819220f63fb333a9a394dd0a5cab2d8303fd17e2 # v2
        with:
          use-installer: true
      - name: SAM build
        if: steps.detect.outputs.tool == 'sam'
        run: |
          sam validate --lint
          sam build
      - name: CDK synth
        if: steps.detect.outputs.tool == 'cdk'
        run: uv run cdk synth --quiet
      - name: Terraform validate
        if: steps.detect.outputs.tool == 'terraform'
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      - name: Terraform plan
        if: steps.detect.outputs.tool == 'terraform'
        run: |
          terraform init -backend=false
          terraform validate
          terraform plan -input=false

  acceptance-tests:
    name: Acceptance tests
    runs-on: ubuntu-latest
    needs: [code-quality, security, unit-tests, compliance, build-validation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_STAGING }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Deploy to staging
        run: |
          if [ -f samconfig.toml ]; then
            sam deploy --config-env staging --no-confirm-changeset --no-fail-on-empty-changeset
          elif [ -f cdk.json ]; then
            uv run cdk deploy --all --require-approval never
          fi
      - name: Run acceptance tests
        run: uv run pytest tests/acceptance -v --html=acceptance-report.html --self-contained-html
      - name: Upload acceptance report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: acceptance-report
          path: acceptance-report.html
