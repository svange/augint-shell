name: CI/CD Pipeline

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, dev]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

# This is a first-run scaffold. After standardize writes it once, you own
# this file -- add custom jobs, wire custom dependencies, organize however
# you like. The canonical gates live in `_gate-*.yaml` reusable workflows
# under `.github/workflows/` and are regenerated on every standardize run.
# Every canonical gate MUST still be referenced here via `uses:` or
# `ai-shell standardize pipeline` will fail with a clear error.

jobs:
  code-quality:
    name: Code quality
    uses: ./.github/workflows/_gate-code-quality.yaml
    secrets: inherit

  security:
    name: Security
    needs: [code-quality]
    uses: ./.github/workflows/_gate-security.yaml
    secrets: inherit

  unit-tests:
    name: Unit tests
    needs: [code-quality]
    uses: ./.github/workflows/_gate-unit-tests.yaml
    secrets: inherit

  compliance:
    name: Compliance
    needs: [code-quality]
    uses: ./.github/workflows/_gate-compliance.yaml
    secrets: inherit

  build-validation:
    name: Build validation
    needs: [code-quality]
    uses: ./.github/workflows/_gate-build-validation.yaml
    secrets: inherit

  acceptance-tests:
    name: Acceptance tests
    needs: [code-quality, security, unit-tests, compliance, build-validation]
    uses: ./.github/workflows/_gate-acceptance-tests.yaml
    secrets: inherit
