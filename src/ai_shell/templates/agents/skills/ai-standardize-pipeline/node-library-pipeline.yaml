name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

# This is a first-run scaffold. After standardize writes it once, you own
# this file -- add custom jobs, wire custom dependencies, organize however
# you like. The canonical gates live in `_gate-*.yaml` reusable workflows
# under `.github/workflows/` and are regenerated on every standardize run.
# Every canonical gate MUST still be referenced here via `uses:` or
# `ai-shell standardize pipeline` will fail with a clear error.

jobs:
  code-quality:
    name: Code quality
    uses: ./.github/workflows/_gate-code-quality.yaml
    secrets: inherit

  security:
    name: Security
    needs: [code-quality]
    uses: ./.github/workflows/_gate-security.yaml
    secrets: inherit

  unit-tests:
    name: Unit tests
    needs: [code-quality]
    uses: ./.github/workflows/_gate-unit-tests.yaml
    secrets: inherit

  compliance:
    name: Compliance
    needs: [code-quality]
    uses: ./.github/workflows/_gate-compliance.yaml
    secrets: inherit

  build-validation:
    name: Build validation
    needs: [code-quality]
    uses: ./.github/workflows/_gate-build-validation.yaml
    secrets: inherit

  release:
    name: Semantic release
    needs: [code-quality, security, unit-tests, compliance, build-validation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: ${{ vars.NODE_VERSION || '20' }}
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: npm ci
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
