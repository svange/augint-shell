gate: Security
language: node
repo_type: service
required_steps:
  - kind: action
    matches: actions/checkout
  - kind: action
    matches: actions/setup-node
  - kind: run
    matches_regex: '^npm ci\b'
  - kind: run
    matches_regex: 'npm audit'
  - kind: action
    matches: semgrep/semgrep-action
