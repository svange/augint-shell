name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

# This is a first-run scaffold. After standardize writes it once, you own
# this file -- add custom jobs, wire custom dependencies, organize however
# you like. The canonical gates live in `_gate-*.yaml` reusable workflows
# under `.github/workflows/` and are regenerated on every standardize run.
# Every canonical gate MUST still be referenced here via `uses:` or
# `ai-shell standardize pipeline` will fail with a clear error.

jobs:
  code-quality:
    name: Code quality
    uses: ./.github/workflows/_gate-code-quality.yaml
    secrets: inherit

  security:
    name: Security
    needs: [code-quality]
    uses: ./.github/workflows/_gate-security.yaml
    secrets: inherit

  unit-tests:
    name: Unit tests
    needs: [code-quality]
    uses: ./.github/workflows/_gate-unit-tests.yaml
    secrets: inherit

  compliance:
    name: Compliance
    needs: [code-quality]
    uses: ./.github/workflows/_gate-compliance.yaml
    secrets: inherit

  build-validation:
    name: Build validation
    needs: [code-quality]
    uses: ./.github/workflows/_gate-build-validation.yaml
    secrets: inherit

  release:
    name: Semantic release
    needs: [code-quality, security, unit-tests, compliance, build-validation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Force release branch to workflow sha
        run: git reset --hard ${{ github.sha }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.12' }}
      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Run semantic release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set +e
          uv run semantic-release --strict version
          EXIT=$?
          set -e
          if [ $EXIT -eq 0 ]; then
            echo "released=true" >> $GITHUB_OUTPUT
            VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi
      - name: Upload distribution artifacts
        if: steps.release.outputs.released == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: distribution-artifacts
          path: dist/
          if-no-files-found: warn

  publish:
    name: Publish to PyPI
    needs: release
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distribution-artifacts
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
          skip-existing: true
