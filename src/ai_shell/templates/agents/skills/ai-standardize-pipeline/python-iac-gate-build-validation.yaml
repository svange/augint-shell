name: Build validation

on:
  workflow_call:

jobs:
  run:
    name: Build validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.12' }}
      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Detect IaC toolchain
        id: detect
        run: |
          if [ -f samconfig.toml ] || [ -f template.yaml ]; then
            echo "tool=sam" >> $GITHUB_OUTPUT
          elif [ -f cdk.json ]; then
            echo "tool=cdk" >> $GITHUB_OUTPUT
          elif ls *.tf >/dev/null 2>&1; then
            echo "tool=terraform" >> $GITHUB_OUTPUT
          else
            echo "tool=none" >> $GITHUB_OUTPUT
          fi
      - name: SAM setup
        if: steps.detect.outputs.tool == 'sam'
        uses: aws-actions/setup-sam@819220f63fb333a9a394dd0a5cab2d8303fd17e2 # v2
        with:
          use-installer: true
      - name: SAM validate and build
        if: steps.detect.outputs.tool == 'sam'
        run: |
          sam validate --lint
          sam build
      - name: CDK synth
        if: steps.detect.outputs.tool == 'cdk'
        run: uv run cdk synth --quiet
      - name: Terraform setup
        if: steps.detect.outputs.tool == 'terraform'
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      - name: Terraform validate and plan
        if: steps.detect.outputs.tool == 'terraform'
        run: |
          terraform init -backend=false
          terraform validate
          terraform plan -input=false
